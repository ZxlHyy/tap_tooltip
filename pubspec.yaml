name: tap_tooltip
description: "A highly customizable tap-to-show tooltip widget for Flutter. Supports four directions (top/bottom/left/right), custom arrow size, rounded corners, blur effect, overlay-safe positioning, and programmatic control via controller."
version: 0.0.2

homepage: https://github.com/ZxlHyy/tap_tooltip
repository: https://github.com/ZxlHyy/tap_tooltip
issue_tracker: https://github.com/ZxlHyy/tap_tooltip/issues
documentation: https://github.com/ZxlHyy/tap_tooltip#readme
topics:
  - tap
  - tooltip
  - click
  - tip

screenshots:
  - description: A tooltip at the top.
    path: images/top.png
  - description: A tooltip at the bottom.
    path: images/bottom.png
  - description: A tooltip at the left.
    path: images/left.png
  - description: A tooltip at the right.
    path: images/right.png
  - description: A tooltip with a child widget.
    path: images/child.png
  - description: A tooltip with a gradient background.
    path: images/gradient.png
  - description: A tooltip with a setting icon.
    path: images/setting.png

platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:

environment:
  sdk: ^3.9.2
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

